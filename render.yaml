services:
  - type: web
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        type: secret
        generateValue: false
      - key: GROQ_API_KEY
        type: secret
        generateValue: false
      - key: ADMIN_TOKEN
        type: secret
        generateValue: true
